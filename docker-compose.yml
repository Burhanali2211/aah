version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "5000:5000"
    env_file:
      - .env.docker
    volumes:
      - ./uploads:/app/uploads
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        - VITE_API_URL=/api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
